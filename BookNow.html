<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rooms - Grand Plaza Hotel</title>
        <link rel="stylesheet" href="Mainstyle.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    </head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-success fs-4" href="#">
               <i class="bi bi-building"></i> Grand Plaza Hotel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link active" href="index.html">
                           <i class="bi bi-house"></i> Home
                        </a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link" href="rooms.html">
                           <i class="bi bi-door-open"></i> Rooms
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-success px-3" href="BookNow.html">
                           <i class="bi bi-calendar-check"></i> Book Now
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container text-center my-5">
        <h1 class="fw-bold text-success">Book Your Stay</h1>
        <p class="text-muted">Simple • Fast • Secure Booking</p>
    </div>

   <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form>
                    <div class="card p-4 mb-4 shadow-sm">
                        <h5 class="text-success mb-3">Personal Details</h5>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" placeholder="Enter your phone number" required>
                        </div>
                    </div>
                    <div class="card p-4 mb-4 shadow-sm">
                        <h5 class="text-success mb-3">Booking Details</h5>

                        <div class="mb-3">
                            <label class="form-label">Room Type</label>
                            <select class="form-select" required>
                                <option value="">Select Room</option>
                                <option>Deluxe - ₹3000</option>
                                <option>Executive - ₹5000</option>
                                <option>Suite - ₹8000</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Check-in</label>
                                <input type="date" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Check-out</label>
                                <input type="date" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Guests</label>
                            <input type="number" class="form-control" min="1" max="5" required>
                        </div>
                    </div>
                    <div class="card p-4 mb-4 shadow-sm">
                        <h5 class="text-success mb-3">Additional Info</h5>

                        <div class="mb-3">
                            <label class="form-label">Meal Plan</label>
                            <select class="form-select" required>
                                <option value="">Select Meal Plan</option>
                                <option>Breakfast Only</option>
                                <option>Breakfast & Dinner</option>
                                <option>All Meals</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Special Requests</label>
                            <textarea class="form-control" rows="3" required></textarea>
                        </div>
                    </div>

                    <div class="card p-4 mb-5 shadow-sm text-center">
                        <h5 class="text-success mb-3">Payment Method</h5>

                        <div class="d-grid gap-3">

                            <button class="btn btn-success" formaction="upi.html">
                                <i class="bi bi-qr-code"></i> Pay via UPI
                            </button>

                            <button class="btn btn-outline-success" formaction="card.html">
                                <i class="bi bi-credit-card"></i> Pay via Card
                            </button>

                            <button class="btn btn-outline-success" formaction="netbanking.html">
                                <i class="bi bi-bank"></i> Bank Transfer
                            </button>

                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer class="bg-success text-white text-center p-4">
        <p class="mb-1 fw-bold">Grand Plaza Hotel</p>
        <p class="mb-0">+91 8263902240 | aniket.grandplazahotel@gmail.com</p>
    </footer>

</body>
</html>
